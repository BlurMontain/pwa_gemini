<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle Diário</title>
    <!-- Adicionando fonte Inter para um visual moderno -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Controle">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="theme-color" content="#050e1d">

    <style>
        /* 
           PASSO 1: VARIÁVEIS DE CORES 
           Aqui definimos as cores baseadas no seu screenshot para manter a estética. 
        */
        :root {
            --bg-body: #050e1d;
            /* Fundo bem escuro */
            --bg-panel: #0b1a30;
            /* Fundo dos painéis e áreas */
            --bg-row-alt: #0d213b;
            /* Linhas alternadas da tabela */
            --primary-cyan: #00d2ff;
            /* Azul claro vivo para botões ativos */
            --text-light: #ffffff;
            /* Texto branco */
            --text-muted: #8ca3c7;
            /* Texto secundário/apagado */
            --btn-dark: #142745;
            /* Botão inativo escuro */
            --border-color: #1e3a5f;
            /* Borda suave */
            --input-border: #008eb3;
            /* Borda azul do input de saída */
        }

        /* 
           PASSO 2: RESET BÁSICO E TIPOGRAFIA
        */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            user-select: none;
            /* Evita seleção acidental no touch do celular */
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Container principal simulando a tela de um iPhone 14 Pro Max */
        #app-container {
            width: 100%;
            max-width: 430px;
            /* Largura base do iPhone Pro Max */
            background-color: var(--bg-body);
            display: flex;
            flex-direction: column;
            padding: 15px;
            position: relative;
        }

        /* 
           PASSO 3: ESTILOS DO CABEÇALHO E TOP BAR
        */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 20px 0;
        }

        .header-arrow {
            color: var(--primary-cyan);
            font-size: 20px;
            cursor: pointer;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            flex-grow: 1;
        }

        /* Botões Diurno / Noturno */
        .shift-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .shift-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .shift-btn.active {
            background-color: var(--primary-cyan);
            color: #000;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        .shift-btn.inactive {
            background-color: var(--btn-dark);
            color: var(--text-muted);
        }

        /* Botão de instalação PWA */
        #install-button {
            background-color: var(--primary-cyan);
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            cursor: pointer;
            width: 100%;
            display: none; /* Escondido por padrão */
        }

        /*
           PASSO 4: TOTAL INICIAL
        */
        .total-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .total-input {
            background-color: var(--btn-dark);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            font-size: 16px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 6px;
            width: 60px;
            text-align: center;
            outline: none;
        }

        .total-input:focus {
            border-color: var(--primary-cyan);
        }

        /*
           PASSO 5: TABELA DE DADOS
        */
        .table-container {
            background-color: var(--bg-panel);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .table-header,
        .table-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            text-align: center;
            align-items: center;
        }

        .table-header {
            background-color: var(--bg-panel);
            padding: 14px 5px;
            font-size: 16px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .table-row {
            padding: 10px 5px;
            font-size: 18px;
        }

        /* Zebrado para as linhas (intercalando as cores igual o screenshot) */
        .table-row:nth-child(even) {
            background-color: var(--bg-row-alt);
            /* Cor mais clara */
        }

        .table-row:nth-child(odd) {
            background-color: var(--bg-panel);
            /* Cor mais escura */
        }

        .cell-saida input {
            background-color: transparent;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            color: var(--text-light);
            text-align: center;
            width: 80%;
            padding: 4px;
            font-size: 20px;
            outline: none;
        }

        .cell-saida input:focus {
            border-color: var(--primary-cyan);
            box-shadow: 0 0 5px rgba(0, 210, 255, 0.4);
        }

        .cell-resto {
            font-weight: 700;
            color: var(--text-light);
        }

        /*
           PASSO 6: BOTÕES INFERIORES
        */
        .bottom-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
            /* Empurra para o fundo se houver espaço */
        }

        .action-btn {
            flex: 1;
            background-color: var(--btn-dark);
            color: var(--primary-cyan);
            border: none;
            padding: 12px 0;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn:active {
            transform: scale(0.95);
            background-color: var(--border-color);
        }

        /* 
           TELA DE LOGIN SOBREPOSTA
        */
        #login-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg-body);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-radius: inherit;
        }

        .login-box {
            background-color: var(--bg-panel);
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            /* Removido display default para evitar piscada */
        }

        .login-box h2 {
            margin-bottom: 20px;
            font-size: 22px;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--btn-dark);
            color: white;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-cyan);
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <!-- CONTAINER PRINCIPAL DO APP -->
    <div id="app-container">

        <!-- Tela de Login (Inicia oculta para evitar piscada) -->
        <div id="login-overlay" class="hidden">
            <div class="login-box">
                <h2>Login</h2>
                <input type="email" id="email" class="login-input" placeholder="Email" />
                <input type="password" id="password" class="login-input" placeholder="Senha" />
                <button class="login-btn" onclick="handleLogin()">Entrar</button>
            </div>
        </div>

        <!-- Cabeçalho -->
        <header>
            <span class="header-arrow" onclick="fazerLogout()">Sair</span>
            <h1>Controle Diario</h1>
            <span class="header-arrow" style="visibility: hidden;">→</span>
        </header>

        <!-- Botão de Instalar (PWA) -->
        <button id="install-button">📥 Instalar Aplicativo na Tela</button>

        <!-- Seleção de Turno -->
        <div class="shift-toggle">
            <button class="shift-btn active">☀️ Diurno</button>
            <button class="shift-btn inactive">🌙 Noturno</button>
        </div>

        <!-- Total Inicial -->
        <div class="total-container">
            <span>Total Inicial:</span>
            <input type="number" id="total-inicial" class="total-input" value="44" onblur="salvarNoBanco(true, null, true)">
        </div>

        <!-- Tabela -->
        <div class="table-container">
            <!-- Cabeçalho da Tabela -->
            <div class="table-header">
                <div>Horario</div>
                <div>Saida</div>
                <div>Resto</div>
                <div>Driver</div>
            </div>

            <!-- Corpo da Tabela (10 linhas geradas dinamicamente ou estáticas) -->
            <div id="table-body">
                <!-- Vamos gerar isso via Javascript para facilitar o didatismo, 
                     mas para preview, deixo 3 linhas de exemplo -->
            </div>
        </div>

        <!-- Botões de Ação Inferiores -->
        <div class="bottom-actions">
            <button class="action-btn" onclick="setDriver()">SetDrv</button>
            <button class="action-btn" onclick="salvarNoBanco()">Salvar</button>
            <button class="action-btn" onclick="recarregarDados()">Recarregar</button>
        </div>

    </div>

    <!-- SUPABASE IMPORT -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <!-- LÓGICA DO APP (JAVASCRIPT) -->
    <script>
        // --- PASSO 7: CONFIGURAÇÃO SUPABASE ---
        // 1. Crie um projeto em supabase.com
        // 2. Vá em Project Settings -> API e copie a URL e a anon_key
        const SUPABASE_URL = 'https://nqqlbzacqszwmlqkdxji.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xcWxiemFjcXN6d21scWtkeGppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTEwNDUsImV4cCI6MjA5MDU4NzA0NX0.YLiZzYksKxYs3Hpt_i0FNwtmVoCE3Z66WrnTa7vULQ0';

        // Inicializa o cliente Supabase com as chaves acima
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- Variáveis de Estado da Aplicação ---
        let currentDriver = localStorage.getItem('driverName') || '';
        let currentTurno = 'Diurno'; // Pode ser 'Diurno' ou 'Noturno'
        let currentRecordId = null; // Guardará o ID do banco de dados para a data atual
        let loggedInUserId = null; // Guardará o ID do usuário após o login

        // Base de horários conforme seu screenshot
        const horariosBase = [
            "5:35", "5:35", "6:05", "6:35", "7:05",
            "7:15", "7:35", "8:05", "8:35", "9:05"
        ];

        // Lógica dos Botões de Turno
        const btnDiurno = document.querySelector('.shift-btn:nth-child(1)');
        const btnNoturno = document.querySelector('.shift-btn:nth-child(2)');

        btnDiurno.onclick = () => {
            currentTurno = 'Diurno';
            btnDiurno.classList.replace('inactive', 'active');
            btnNoturno.classList.replace('active', 'inactive');
            recarregarDados(); // Recarrega os dados ao trocar turno
        };

        btnNoturno.onclick = () => {
            currentTurno = 'Noturno';
            btnNoturno.classList.replace('inactive', 'active');
            btnDiurno.classList.replace('active', 'inactive');
            recarregarDados(); // Recarrega os dados ao trocar turno
        };

        // --- PASSO 8: RENDERIZAR A TABELA ---
        // Função didática para desenhar as 10 linhas no HTML
        function renderTable(dadosSalvos = null) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; // Limpa antes de desenhar

            horariosBase.forEach((horario, index) => {
                // Se recebemos dados salvos do Supabase, usamos eles
                const valorSaida = dadosSalvos && dadosSalvos[index] && dadosSalvos[index].saida ? dadosSalvos[index].saida : '';
                const valorDriver = dadosSalvos && dadosSalvos[index] && dadosSalvos[index].driver ? dadosSalvos[index].driver : '';

                const row = document.createElement('div');
                row.className = 'table-row';

                row.innerHTML = `
                    <div class="cell-horario">${horario}</div>
                    <div class="cell-saida">
                        <input type="number" 
                               id="saida-${index}" 
                               class="saida-input" 
                               value="${valorSaida}"
                               oninput="stampDriver(${index}); recalcularResto()" 
                               onfocus="stampDriver(${index})"
                               onblur="salvarNoBanco(true, ${index})">
                    </div>
                    <div class="cell-resto" id="resto-${index}"></div>
                    <div class="cell-driver" id="driver-${index}">${valorDriver}</div>
                `;
                tbody.appendChild(row);
            });

            // Apagado: recalcularResto() que rodava via javascript, pois agora o Supabase fará!
        }

        // --- PASSO 9: LÓGICA DE NEGÓCIO ---

        // Pega YYYY-MM-DD para a data
        function getLocalYYYYMMDD() {
            const now = new Date();
            // Usando fuso local do navegador para evitar confusão de data
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // Pega HH:MM:SS para a coluna 'time'
        function getLocalTime() {
            const now = new Date();
            return now.toTimeString().split(' ')[0]; // Retorna "14:30:00"
        }

        // 9.1: Motorista Local (LocalStorage)
        function setDriver() {
            const driverName = prompt("Digite o nome do Motorista para este celular:", currentDriver);
            if (driverName !== null && driverName.trim() !== '') {
                currentDriver = driverName.trim();
                localStorage.setItem('driverName', currentDriver);
                alert("Motorista configurado: " + currentDriver);
            }
        }

        // 9.2: Carimbar Motorista ao tocar no Input
        function stampDriver(index) {
            if (!currentDriver) {
                alert("Por favor, configure o Motorista clicando em SetDrv primeiro!");
                return;
            }
            // Apenas carimba se o campo estiver vazio, evitando sobrescrever sem querer
            const driverCell = document.getElementById(`driver-${index}`);
            if (driverCell.innerText === "") {
                driverCell.innerText = currentDriver;
            }
        }

        // --- PASSO 10: INTEGRAÇÃO REAL SUPABASE ---

        // 10.1 Login Autenticado
        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Preencha email e senha.");
                return;
            }

            try {
                // Tenta logar no Supabase
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                // Sucesso
                loggedInUserId = data.user.id; // Guarda o ID do usuário para usar no 'salvar'
                document.getElementById('login-overlay').classList.add('hidden');
                recarregarDados(); // Puxa os dados após o login

            } catch (error) {
                alert("Erro ao logar: " + error.message + "\n\n(Verifique as chaves ou usuário!)");
            }
        }

        // 10.2 Verificar Sessão Ativa
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                loggedInUserId = session.user.id;
                document.getElementById('login-overlay').classList.add('hidden');
                recarregarDados();
            } else {
                document.getElementById('login-overlay').classList.remove('hidden');
            }
        }

        // 10.2.5 Fazer Logout (Sair)
        async function fazerLogout() {
            await supabaseClient.auth.signOut();
            loggedInUserId = null;
            document.getElementById('total-inicial').value = '';
            renderTable();
            document.getElementById('login-overlay').classList.remove('hidden');
        }

        // 10.3 Puxar do Supabase
        async function recarregarDados() {
            const hoje = getLocalYYYYMMDD();

            try {
                const { data, error } = await supabaseClient
                    .from('registros_diarios')
                    .select('*')
                    .eq('data', hoje)
                    .eq('turno', currentTurno)
                    .limit(1);

                if (error) {
                    console.error("Erro retornado pelo Supabase:", error);
                    throw error;
                }

                const record = data && data.length > 0 ? data[0] : null;

                if (record) {
                    currentRecordId = record.id;
                    document.getElementById('total-inicial').value = record.total_inicial;
                    
                    // Sempre renderiza ou atualiza se houver record
                    renderTable(record.linhas);
                } else {
                    currentRecordId = null;
                    document.getElementById('total-inicial').value = '';
                    renderTable();
                }

            } catch (error) {
                console.error("Erro detectado na função recarregarDados: ", error);
                // Se houver erro 406, alertar o usuário sobre possíveis problemas de permissão ou estrutura
                if (error.code === 'PGRST106' || error.status === 406) {
                    alert("Erro 406: Verifique se as permissões (RLS) da tabela 'registros_diarios' estão configuradas corretamente no Supabase.");
                }
            }
        }

        // 10.4 Enviar para o banco (Concorrente e delegando Matemática)
        async function salvarNoBanco(silencioso = false, indexModificado = null, totalModificado = false) {
            const hoje = getLocalYYYYMMDD();
            const totalInicialTela = parseFloat(document.getElementById('total-inicial').value) || 0;

            if (currentRecordId) {
                // MODO UPDATE CONCORRENTE: Puxar do banco instantes antes de atualizar!
                const { data: dbData } = await supabaseClient.from('registros_diarios').select('*').eq('id', currentRecordId).limit(1);
                const db = dbData && dbData.length > 0 ? dbData[0] : null;
                
                let payload = {};
                let atualizou = false;

                if (indexModificado !== null && db) {
                    let linhasDoBanco = db.linhas;
                    const saidaStr = document.getElementById(`saida-${indexModificado}`).value;
                    const driverStr = document.getElementById(`driver-${indexModificado}`).innerText;
                    
                    linhasDoBanco[indexModificado].saida = saidaStr !== "" ? parseFloat(saidaStr) : null;
                    linhasDoBanco[indexModificado].driver = driverStr;
                    payload.linhas = linhasDoBanco;
                    atualizou = true;
                }
                
                if (totalModificado) {
                    payload.total_inicial = totalInicialTela;
                    atualizou = true;
                }

                // Se clicou no botão "Salvar" geral, mescla a tela inteira (somente o que tá preenchido):
                    let totalSimulado = totalInicialTela;
                    let linhasDoBanco = db ? db.linhas : [];
                    for (let i = 0; i < horariosBase.length; i++) {
                        const s = document.getElementById(`saida-${i}`).value;
                        const d = document.getElementById(`driver-${i}`).innerText;
                        
                        if (!linhasDoBanco[i]) linhasDoBanco[i] = { horario: horariosBase[i], resto: null };
                        
                        // Atualiza saida e driver se houver algo na tela
                        linhasDoBanco[i].saida = s !== "" ? parseFloat(s) : linhasDoBanco[i].saida;
                        linhasDoBanco[i].driver = d !== "" ? d : linhasDoBanco[i].driver;
                        
                        // Calcula e Salva o Resto no objeto que vai pro banco
                        if (linhasDoBanco[i].saida !== null) {
                            totalSimulado -= linhasDoBanco[i].saida;
                            linhasDoBanco[i].resto = totalSimulado;
                        } else {
                            linhasDoBanco[i].resto = null;
                        }
                    }
                    payload.linhas = linhasDoBanco;
                    payload.total_inicial = totalInicialTela;
                }

                const { data, error } = await supabaseClient.from('registros_diarios').update(payload).eq('id', currentRecordId).select();
                if (error) { if(!silencioso) alert("Erro! " + error.message); return; }
                if (!silencioso) alert("Dados Atualizados no Banco!");
                
                // Estampa de volta os Restos calculados pela Função do Supabase!
                if (data && data.length > 0) atualizarTabelaUI(data[0].linhas);

            } else {
                // INSERT MODO (Criando o dia)
                const linhas = [];
                let totalSimulado = totalInicialTela;
                for (let i = 0; i < horariosBase.length; i++) {
                    const saida = document.getElementById(`saida-${i}`).value;
                    const driver = document.getElementById(`driver-${i}`).innerText;
                    const saidaVal = saida !== "" ? parseFloat(saida) : null;
                    
                    let restoVal = null;
                    if (saidaVal !== null) {
                        totalSimulado -= saidaVal;
                        restoVal = totalSimulado;
                    }

                    linhas.push({
                        horario: horariosBase[i],
                        saida: saidaVal,
                        resto: restoVal,
                        driver: driver
                    });
                }

                const payload = {
                    data: hoje,
                    time: getLocalTime(),
                    turno: currentTurno,
                    total_inicial: totalInicialTela,
                    user_id: loggedInUserId,
                    linhas: linhas 
                };

                const { data, error } = await supabaseClient.from('registros_diarios').insert([payload]).select();
                if (error) { if(!silencioso) alert("Erro! " + error.message); return; }
                
                if(data && data.length > 0) {
                    currentRecordId = data[0].id; 
                    atualizarTabelaUI(data[0].linhas);
                }
                if (!silencioso) alert("Novo Dia Iniciado!");
            }
            recalcularResto(); // Recalcula após salvar também
        }

        // --- NOVO: Função para calcular os saldos (Resto) ---
        function recalcularResto() {
            let total = parseFloat(document.getElementById('total-inicial').value) || 0;
            
            for (let i = 0; i < horariosBase.length; i++) {
                const elSaida = document.getElementById(`saida-${i}`);
                const elResto = document.getElementById(`resto-${i}`);
                
                const saidaVal = parseFloat(elSaida.value) || 0;
                
                if (elSaida.value !== "") {
                    total -= saidaVal;
                    elResto.innerText = total;
                } else {
                    elResto.innerText = "";
                }
            }
        }

        // 10.5 Função silenciosa para não piscar a interface perdendo o Foco da digitação!
        function atualizarTabelaUI(matrizBD) {
            for(let i = 0; i < matrizBD.length; i++) {
                const elSaida = document.getElementById(`saida-${i}`);
                const elResto = document.getElementById(`resto-${i}`);
                const elDriver = document.getElementById(`driver-${i}`);
                
                if (document.activeElement !== elSaida) {
                     elSaida.value = matrizBD[i].saida !== null ? matrizBD[i].saida : '';
                }
                
                elResto.innerText = matrizBD[i].resto !== null ? matrizBD[i].resto : '';
                elDriver.innerText = matrizBD[i].driver || '';
            }
            recalcularResto(); // Atualiza os restos após preencher a UI
        }

        // Iniciar App IMEDIATAMENTE (mais rápido que window.onload)
        renderTable();
        checkSession();

        // Registro do Service Worker (PWA)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker registrado!', reg))
                .catch(err => console.error('Erro ao registrar Service Worker', err));
        }

        // Lógica do botão de instalação PWA
        let deferredPrompt;
        const installBtn = document.getElementById('install-button');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Previne o Chrome 67 e anteriores de mostrar o prompt automaticamente
            e.preventDefault();
            // Guarda o evento para ser disparado depois
            deferredPrompt = e;
            // Mostra o botão de instalação
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', (e) => {
            // Esconde o botão
            installBtn.style.display = 'none';
            // Mostra o prompt de instalação
            deferredPrompt.prompt();
            // Espera pela resposta do usuário
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('Usuário aceitou a instalação');
                } else {
                    console.log('Usuário recusou a instalação');
                }
                deferredPrompt = null;
            });
        });

        window.addEventListener('appinstalled', (evt) => {
            console.log('App instalado com sucesso!');
            installBtn.style.display = 'none';
        });
    </script>
</body>

</html>
